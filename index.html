<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقرير اليومي للمدرب الميداني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between">

    <div id="auth-screen" class="hidden flex-grow flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-white mb-2">تسجيل الدخول</h1>
                <p class="text-slate-400 text-sm">نظام تقارير المدربين الميدانيين</p>
            </div>
            <form id="auth-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">البريد الإلكتروني</label>
                    <input type="email" id="auth-email" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl focus:ring-2 focus:ring-indigo-500 text-white outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">كلمة المرور</label>
                    <input type="password" id="auth-password" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl focus:ring-2 focus:ring-indigo-500 text-white outline-none">
                </div>
                <div class="space-y-3 pt-2">
                    <button type="submit" id="btn-login" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3 rounded-xl transition-all shadow-lg">دخول</button>
                    <button type="button" id="btn-signup" class="w-full bg-transparent border border-slate-700 hover:bg-slate-800 text-slate-300 font-medium py-3 rounded-xl transition-all">إنشاء حساب جديد</button>
                </div>
            </form>
        </div>
    </div>

    <div id="app-screen" class="flex-grow flex flex-col">
        <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 px-4 py-4 shadow-md">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <span class="text-indigo-400 text-lg font-bold">التقرير الميداني اليومي</span>
                <button id="btn-logout" class="hidden bg-slate-800 text-slate-300 px-3 py-1.5 rounded-lg text-sm border border-slate-700">خروج</button>
            </div>
        </header>

        <div class="bg-slate-900/50 border-b border-slate-800/60 p-2">
            <div class="max-w-6xl mx-auto flex gap-2">
                <button id="tab-form" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium">إدخال التقرير</button>
                <button id="tab-dashboard" class="flex-1 px-4 py-2 bg-slate-800 text-slate-300 rounded-lg text-sm font-medium">الأرشيف والمتابعة</button>
            </div>
        </div>

        <main class="max-w-6xl w-full mx-auto p-4 flex-grow">
            <section id="form-view" class="max-w-2xl mx-auto py-4">
                <form id="daily-data-form" class="space-y-6">
                    
                    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-4">
                        <h3 class="text-lg font-bold text-indigo-400 border-b border-slate-800 pb-2">البيانات الأساسية</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div><label class="block text-xs text-slate-400 mb-1">اسم المدرب</label><input type="text" id="f-name" required class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></div>
                            <div><label class="block text-xs text-slate-400 mb-1">الكود الوظيفي</label><input type="text" id="f-code" required class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></div>
                            <div><label class="block text-xs text-slate-400 mb-1">التاريخ</label><input type="date" id="f-date" required class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></div>
                            <div><label class="block text-xs text-slate-400 mb-1">المنطقة</label><input type="text" id="f-region" required class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></div>
                            <div class="sm:col-span-2"><label class="block text-xs text-slate-400 mb-1">المشرف المباشر</label><input type="text" id="f-supervisor" required class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></div>
                        </div>
                    </div>

                    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-4">
                        <h3 class="text-lg font-bold text-indigo-400 border-b border-slate-800 pb-2">أوقات العمل</h3>
                        <div class="grid grid-cols-3 gap-3">
                            <div><label class="block text-xs text-slate-400 mb-1">الحضور</label><input type="time" id="f-time-in" class="w-full px-2 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></div>
                            <div><label class="block text-xs text-slate-400 mb-1">الانصراف</label><input type="time" id="f-time-out" class="w-full px-2 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></div>
                            <div><label class="block text-xs text-slate-400 mb-1">إجمالي الساعات</label><input type="number" id="f-hours" class="w-full px-2 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none" placeholder="مثال: 8"></div>
                        </div>
                    </div>

                    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-4">
                        <h3 class="text-lg font-bold text-indigo-400 border-b border-slate-800 pb-2">الأنشطة المنفذة (اختر واكتب التفاصيل)</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm" id="activities-group">
                            
                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" value="محاضرة نظرية" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> 
                                    <span class="font-medium text-slate-300">محاضرة نظرية</span>
                                </label>
                                <input type="text" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-xs text-white outline-none focus:border-indigo-500" placeholder="اكتب تفاصيل المحاضرة هنا...">
                            </div>

                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" value="تدريب عملي" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> 
                                    <span class="font-medium text-slate-300">تدريب عملي</span>
                                </label>
                                <input type="text" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-xs text-white outline-none focus:border-indigo-500" placeholder="اكتب تفاصيل التدريب هنا...">
                            </div>

                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" value="تدريب على رأس العمل" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> 
                                    <span class="font-medium text-slate-300">تدريب على رأس العمل</span>
                                </label>
                                <input type="text" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-xs text-white outline-none focus:border-indigo-500" placeholder="اكتب التفاصيل هنا...">
                            </div>

                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" value="استصحاب قطارات" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> 
                                    <span class="font-medium text-slate-300">استصحاب قطارات</span>
                                </label>
                                <input type="text" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-xs text-white outline-none focus:border-indigo-500" placeholder="رقم القطار / الرحلة...">
                            </div>

                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" value="تفتيش ميداني" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> 
                                    <span class="font-medium text-slate-300">تفتيش ميداني</span>
                                </label>
                                <input type="text" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-xs text-white outline-none focus:border-indigo-500" placeholder="مكان وتفاصيل التفتيش...">
                            </div>

                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" value="زيارة ورش/أحواش" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> 
                                    <span class="font-medium text-slate-300">زيارة ورش / أحواش</span>
                                </label>
                                <input type="text" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-xs text-white outline-none focus:border-indigo-500" placeholder="اسم الورشة / الحوش...">
                            </div>

                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" value="جلسة أونلاين" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> 
                                    <span class="font-medium text-slate-300">جلسة أونلاين</span>
                                </label>
                                <input type="text" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-xs text-white outline-none focus:border-indigo-500" placeholder="موضوع الجلسة والمنصة...">
                            </div>

                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" value="حضور تحقيق" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> 
                                    <span class="font-medium text-slate-300">حضور تحقيق</span>
                                </label>
                                <input type="text" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-xs text-white outline-none focus:border-indigo-500" placeholder="تفاصيل التحقيق...">
                            </div>

                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all sm:col-span-2">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" value="أخري" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> 
                                    <span class="font-medium text-slate-300">أخري</span>
                                </label>
                                <input type="text" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-xs text-white outline-none focus:border-indigo-500" placeholder="اكتب تفاصيل الأنشطة الأخرى هنا...">
                            </div>

                        </div>
                    </div>

                    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-4">
                        <h3 class="text-lg font-bold text-indigo-400 border-b border-slate-800 pb-2">تفاصيل العمل والمستهدفين</h3>
                        <div><label class="block text-xs text-slate-400 mb-1">أماكن العمل أو الزيارات</label><input type="text" id="f-locations" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></div>
                        <div><label class="block text-xs text-slate-400 mb-1">الموضوعات التدريبية</label><input type="text" id="f-topics" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></div>
                        <div><label class="block text-xs text-slate-400 mb-1">الفئات المستهدفة</label><input type="text" id="f-targets" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></div>
                        <div><label class="block text-xs text-slate-400 mb-1">عدد المتدربين وأسمائهم</label><textarea id="f-trainees" rows="2" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></textarea></div>
                    </div>

                    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-4">
                        <h3 class="text-lg font-bold text-indigo-400 border-b border-slate-800 pb-2">الملاحظات والنتائج</h3>
                        <div><label class="block text-xs text-slate-400 mb-1">التعليمات أو المنشورات التي تم توصيلها</label><textarea id="f-instructions" rows="2" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></textarea></div>
                        <div><label class="block text-xs text-slate-400 mb-1">الملاحظات والمعوقات</label><textarea id="f-notes" rows="2" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></textarea></div>
                        <div><label class="block text-xs text-slate-400 mb-1">الإجراءات المتخذة</label><textarea id="f-actions" rows="2" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></textarea></div>
                        <div><label class="block text-xs text-slate-400 mb-1">التوصيات</label><textarea id="f-recommendations" rows="2" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></textarea></div>
                        <div><label class="block text-xs text-slate-400 mb-1">ملخص إنجازات اليوم</label><textarea id="f-summary" rows="3" required class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none"></textarea></div>
                    </div>

                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all text-lg">إرسال التقرير النهائي</button>
                </form>
            </section>

            <section id="dashboard-view" class="hidden space-y-6 py-4">
                <input type="text" id="search-filter" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 text-white outline-none" placeholder="ابحث باسم المدرب أو المنطقة أو التاريخ...">
                
                <div id="logs-container" class="space-y-4">
                    </div>
            </section>

        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ ضع مفاتيح Firebase الخاصة بك هنا
        const firebaseConfig = {
            apiKey: "AIzaSyDqOMOxCyTBRouVjAN-70FNaJjTElqeJdE",
    authDomain: "gharably-aad60.firebaseapp.com",
    projectId: "gharably-aad60",
    storageBucket: "gharably-aad60.firebasestorage.app",
    messagingSenderId: "715813598117",
    appId: "1:715813598117:web:d7a3eea856f20ec4a2ee4c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allLogs = [];

        // إظهار وإخفاء مربع النص عند اختيار النشاط
        document.querySelectorAll('.activity-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', (e) => {
                const parentDiv = e.target.closest('div');
                const inputField = parentDiv.querySelector('.activity-input');
                if (e.target.checked) {
                    inputField.classList.remove('hidden');
                    inputField.focus();
                } else {
                    inputField.classList.add('hidden');
                    inputField.value = ''; // تفريغ الحقل إذا تم إزالة علامة الصح
                }
            });
        });

        // التنقل بين الشاشات
        function showView(view) {
            document.getElementById('form-view').classList.toggle('hidden', view !== 'form');
            document.getElementById('dashboard-view').classList.toggle('hidden', view !== 'dashboard');
            document.getElementById('tab-form').className = view === 'form' ? "flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium" : "flex-1 px-4 py-2 bg-slate-800 text-slate-300 rounded-lg text-sm font-medium";
            document.getElementById('tab-dashboard').className = view === 'dashboard' ? "flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium" : "flex-1 px-4 py-2 bg-slate-800 text-slate-300 rounded-lg text-sm font-medium";
            if(view === 'dashboard') loadLogsData();
        }

        document.getElementById('tab-form').addEventListener('click', () => showView('form'));
        document.getElementById('tab-dashboard').addEventListener('click', () => showView('dashboard'));

        // ==========================================
        // ⚠️ تم إيقاف نظام الدخول مؤقتاً (Hold)
        // ==========================================
        /*
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                showView('form');
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });
        */
        
        // تشغيل واجهة الإدخال مباشرة متخطياً تسجيل الدخول
        showView('form');

        // الدخول (مجمد)
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const btn = document.getElementById('btn-login');
                btn.innerText = "جاري الدخول...";
                await signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value);
                btn.innerText = "دخول";
            } catch (error) { 
                alert("خطأ في الدخول: " + error.message);
                document.getElementById('btn-login').innerText = "دخول";
            }
        });

        // إنشاء حساب (مجمد)
        document.getElementById('btn-signup').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) { alert("يرجى كتابة البريد وكلمة المرور أولاً"); return; }
            try {
                const btn = document.getElementById('btn-signup');
                btn.innerText = "جاري الإنشاء...";
                await createUserWithEmailAndPassword(auth, email, password);
                alert("تم إنشاء الحساب وتسجيل الدخول بنجاح!");
                btn.innerText = "إنشاء حساب جديد";
            } catch (error) {
                alert("خطأ في إنشاء الحساب: " + error.message);
                document.getElementById('btn-signup').innerText = "إنشاء حساب جديد";
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // إرسال البيانات
        document.getElementById('daily-data-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // تجميع الأنشطة المختارة مع تفاصيلها النصية
            const selectedActivities = [];
            document.querySelectorAll('.activity-checkbox:checked').forEach(cb => {
                const parentDiv = cb.closest('div');
                const textInput = parentDiv.querySelector('.activity-input');
                let activityText = cb.value;
                if (textInput && textInput.value.trim() !== '') {
                    activityText += ` (${textInput.value.trim()})`; // دمج النشاط مع التفاصيل
                }
                selectedActivities.push(activityText);
            });

            const reportData = {
                trainerName: document.getElementById('f-name').value,
                jobCode: document.getElementById('f-code').value,
                reportDate: document.getElementById('f-date').value,
                region: document.getElementById('f-region').value,
                supervisor: document.getElementById('f-supervisor').value,
                timeIn: document.getElementById('f-time-in').value,
                timeOut: document.getElementById('f-time-out').value,
                totalHours: document.getElementById('f-hours').value,
                activities: selectedActivities,
                locations: document.getElementById('f-locations').value,
                topics: document.getElementById('f-topics').value,
                targets: document.getElementById('f-targets').value,
                trainees: document.getElementById('f-trainees').value,
                instructions: document.getElementById('f-instructions').value,
                notes: document.getElementById('f-notes').value,
                actions: document.getElementById('f-actions').value,
                recommendations: document.getElementById('f-recommendations').value,
                summary: document.getElementById('f-summary').value,
                // تعديل لتفادي مشكلة عدم وجود مستخدم مسجل
                submitterEmail: auth.currentUser ? auth.currentUser.email : "مستخدم مؤقت (بدون تسجيل)",
                timestamp: new Date().toISOString()
            };
            
            try {
                const btn = e.target.querySelector('button[type="submit"]');
                btn.innerText = "جاري الإرسال..."; btn.disabled = true;
                await addDoc(collection(db, "daily_reports"), reportData);
                alert("تم رفع التقرير بنجاح!");
                e.target.reset();
                // إعادة إخفاء كل مربعات نص الأنشطة بعد التفريغ
                document.querySelectorAll('.activity-input').forEach(input => input.classList.add('hidden'));
                btn.innerText = "إرسال التقرير النهائي"; btn.disabled = false;
            } catch (error) {
                alert("خطأ: " + error.message);
                e.target.querySelector('button[type="submit"]').innerText = "إرسال التقرير النهائي";
                e.target.querySelector('button[type="submit"]').disabled = false;
            }
        });

        // جلب البيانات للأرشيف
        async function loadLogsData() {
            const container = document.getElementById('logs-container');
            container.innerHTML = `<p class="text-center text-slate-500 py-10">جاري التحميل...</p>`;
            try {
                const q = query(collection(db, "daily_reports"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                allLogs = [];
                querySnapshot.forEach((doc) => allLogs.push(doc.data()));
                renderLogs(allLogs);
            } catch (error) {
                container.innerHTML = `<p class="text-center text-red-500">فشل التحميل: ${error.message}</p>`;
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('logs-container');
            if(logs.length === 0) { container.innerHTML = `<p class="text-center text-slate-500 py-10">لا توجد تقارير حتى الآن.</p>`; return; }
            
            container.innerHTML = "";
            logs.forEach(log => {
                // عرض الأنشطة المختارة بطريقة منظمة
                const acts = log.activities && log.activities.length > 0 
                    ? log.activities.map(a => `<span class="block bg-slate-800 text-slate-300 px-2 py-1 rounded mt-1 text-xs border border-slate-700">${a}</span>`).join('') 
                    : '<span class="text-slate-500 text-xs">لم يتم تحديد أنشطة</span>';
                
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-3";
                card.innerHTML = `
                    <div class="flex justify-between items-start border-b border-slate-800 pb-3">
                        <div>
                            <h3 class="font-bold text-white text-lg">${log.trainerName}</h3>
                            <p class="text-xs text-slate-400 mt-1">المنطقة: ${log.region} | الكود: ${log.jobCode}</p>
                        </div>
                        <span class="text-xs bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded-full border border-indigo-500/30">${log.reportDate}</span>
                    </div>
                    <div class="text-sm text-slate-300 space-y-2 pt-2">
                        <div><strong class="text-indigo-400 block mb-1">الأنشطة المنفذة:</strong> ${acts}</div>
                        <p class="pt-2"><strong class="text-indigo-400">الموضوعات:</strong> ${log.topics || '-'}</p>
                        <div class="bg-slate-950 p-3 rounded-lg border border-slate-800 mt-3">
                            <strong class="text-xs text-slate-500 block mb-1">ملخص الإنجاز:</strong>
                            <p class="whitespace-pre-line leading-relaxed">${log.summary}</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('search-filter').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allLogs.filter(log => 
                (log.trainerName && log.trainerName.toLowerCase().includes(term)) || 
                (log.region && log.region.toLowerCase().includes(term)) ||
                (log.reportDate && log.reportDate.includes(term))
            );
            renderLogs(filtered);
        });
    </script>
</body>
</html>
