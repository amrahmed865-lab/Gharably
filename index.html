<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المتابعة اليومي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between">

    <div id="auth-screen" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-500/10 text-indigo-400 mb-4 border border-indigo-500/20">
                    <i class="fa-solid fa-shield-halved text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">تسجيل الدخول</h1>
                <p class="text-slate-400 text-sm mt-2">أدخل بياناتك للوصول إلى النظام اليومي</p>
            </div>
            
            <form id="auth-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">البريد الإلكتروني</label>
                    <input type="email" id="auth-email" required class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-white placeholder-slate-500 transition-all outline-none" placeholder="name@company.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">كلمة المرور</label>
                    <input type="password" id="auth-password" required class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-white placeholder-slate-500 transition-all outline-none" placeholder="••••••••">
                </div>
                <button type="submit" id="btn-login" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-indigo-600/20 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-right-to-bracket"></i> دخول
                </button>
                <button type="button" id="btn-signup" class="w-full bg-transparent hover:bg-slate-800 text-slate-400 border border-slate-800 font-medium py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                    إنشاء حساب جديد
                </button>
            </form>
        </div>
    </div>

    <div id="app-screen" class="hidden flex-grow flex flex-col">
        <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 px-4 py-4 shadow-md">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <span class="text-indigo-400 text-xl font-bold flex items-center gap-2">
                        <i class="fa-solid fa-square-poll-vertical"></i> نظام المتابعة
                    </span>
                </div>
                <div class="flex items-center gap-3">
                    <span id="user-display" class="text-sm text-slate-400 hidden sm:inline"></span>
                    <button id="btn-logout" class="bg-slate-800 hover:bg-red-950/40 text-slate-300 hover:text-red-400 border border-slate-700 hover:border-red-900/50 px-3 py-1.5 rounded-lg text-sm transition-all flex items-center gap-1.5">
                        <i class="fa-solid fa-arrow-right-from-bracket text-xs"></i> خروج
                    </button>
                </div>
            </div>
        </header>

        <div class="bg-slate-900/50 border-b border-slate-800/60 p-2">
            <div class="max-w-6xl mx-auto flex gap-2">
                <button id="tab-form" class="flex-1 sm:flex-none px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-pen-to-square"></i> إدخال البيانات اليومية
                </button>
                <button id="tab-dashboard" class="flex-1 sm:flex-none px-4 py-2 bg-slate-800 text-slate-300 hover:bg-slate-700 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-chart-line"></i> لوحة المتابعة (المدير)
                </button>
            </div>
        </div>

        <main class="max-w-6xl w-full mx-auto p-4 flex-grow">
            
            <section id="form-view" class="space-y-6 max-w-xl mx-auto py-4">
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                    <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                        <i class="fa-solid fa-file-invoice text-indigo-400"></i> تقرير اليوم المعتاد
                    </h2>
                    
                    <form id="daily-data-form" class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">اسم الموظف / المسؤول</label>
                            <input type="text" id="log-name" required class="w-full px-4 py-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-white outline-none">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">حالة العمل الحالية</label>
                            <select id="log-status" class="w-full px-4 py-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-white outline-none">
                                <option value="مكتمل">🟢 مكتمل بالكامل</option>
                                <option value="جاري العمل">🟡 جاري العمل حالياً</option>
                                <option value="متأخر / معلق">🔴 متأخر / يوجد معوقات</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">تفاصيل المهام والإدخال اليومي</label>
                            <textarea id="log-details" rows="4" required class="w-full px-4 py-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-white outline-none placeholder-slate-600" placeholder="اكتب بالتفصيل ما تم إنجازه أو الأجزاء المتأخرة..."></textarea>
                        </div>

                        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-emerald-600/10 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-cloud-arrow-up"></i> إرسال البيانات وحفظها
                        </button>
                    </form>
                </div>
            </section>

            <section id="dashboard-view" class="hidden space-y-6 py-4">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-900 border border-slate-800 p-4 rounded-xl">
                    <div>
                        <h2 class="text-xl font-bold text-white">استعراض وتتبع كافة البيانات</h2>
                        <p class="text-xs text-slate-400 mt-1">تحديث لحظي ومباشر لكافة المدخلات</p>
                    </div>
                    <div class="w-full sm:w-64 relative">
                        <i class="fa-solid fa-magnifying-glass absolute right-3 top-3.5 text-slate-500 text-sm"></i>
                        <input type="text" id="search-filter" class="w-full pl-4 pr-9 py-2 bg-slate-950 border border-slate-800 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 text-white outline-none placeholder-slate-500" placeholder="ابحث باسم الشخص أو الحالة...">
                    </div>
                </div>

                <div id="logs-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="text-center py-12 text-slate-500 col-span-full">
                        <i class="fa-solid fa-spinner animate-spin text-2xl mb-2"></i>
                        <p>جاري تحميل البيانات الحالية...</p>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <footer class="bg-slate-950 border-t border-slate-900 py-4 text-center text-xs text-slate-600">
        نظام المتابعة الفوري عبر السحابة الذكية © 2026
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ ضَع إعدادات مشروع Firebase الخاص بك هنا بالأسفل:
        const firebaseConfig = {
            apiKey: "AIzaSyDqOMOxCyTBRouVjAN-70FNaJjTElqeJdE",
    authDomain: "gharably-aad60.firebaseapp.com",
    projectId: "gharably-aad60",
    storageBucket: "gharably-aad60.firebasestorage.app",
    messagingSenderId: "715813598117",
    appId: "1:715813598117:web:d7a3eea856f20ec4a2ee4c",

        };

        // تهيئة التطبيق
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // عناصر الواجهة
        const authScreen = document.getElementById('auth-screen');
        const appScreen = document.getElementById('app-screen');
        const authForm = document.getElementById('auth-form');
        const dailyForm = document.getElementById('daily-data-form');
        const logsContainer = document.getElementById('logs-container');
        const searchFilter = document.getElementById('search-filter');

        let allLogs = []; // لتخزين البيانات محلياً لتسهيل البحث والفلترة

        // إدارة التبديل بين الشاشات والتبويبات
        function showView(viewName) {
            if(viewName === 'form') {
                document.getElementById('form-view').classList.remove('hidden');
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('tab-form').className = "flex-1 sm:flex-none px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2";
                document.getElementById('tab-dashboard').className = "flex-1 sm:flex-none px-4 py-2 bg-slate-800 text-slate-300 hover:bg-slate-700 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2";
            } else {
                document.getElementById('form-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('tab-form').className = "flex-1 sm:flex-none px-4 py-2 bg-slate-800 text-slate-300 hover:bg-slate-700 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2";
                document.getElementById('tab-dashboard').className = "flex-1 sm:flex-none px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2";
                loadLogsData();
            }
        }

        document.getElementById('tab-form').addEventListener('click', () => showView('form'));
        document.getElementById('tab-dashboard').addEventListener('click', () => showView('dashboard'));

        // مراقبة حالة تسجيل دخول المستخدم
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                showView('form');
            } else {
                authScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }
        });

        // عمليات تسجيل الدخول وإنشاء الحساب
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert("خطأ في تسجيل الدخول: " + error.message);
            }
        });

        document.getElementById('btn-signup').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) { alert("يرجى كتابة البريد وكلمة المرور أولاً"); return; }
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                alert("تم إنشاء الحساب بنجاح ودخولك للنظام!");
            } catch (error) {
                alert("خطأ في إنشاء الحساب: " + error.message);
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // إرسال البيانات اليومية وحفظها في Firestore
        dailyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('log-name').value;
            const status = document.getElementById('log-status').value;
            const details = document.getElementById('log-details').value;
            
            try {
                await addDoc(collection(db, "daily_logs"), {
                    name: name,
                    status: status,
                    details: details,
                    userEmail: auth.currentUser.email,
                    timestamp: new Date().toISOString()
                });
                alert("تم إرسال تقريرك اليومي بنجاح مذهل!");
                dailyForm.reset();
            } catch (error) {
                alert("حدث خطأ أثناء الحفظ: " + error.message);
            }
        });

        // سحب البيانات وعرضها في لوحة المدير
        async function loadLogsData() {
            logsContainer.innerHTML = `<div class="text-center py-12 text-slate-500 col-span-full"><i class="fa-solid fa-spinner animate-spin text-2xl mb-2"></i><p>جاري تحديث البيانات السحابية...</p></div>`;
            try {
                const q = query(collection(db, "daily_logs"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                allLogs = [];
                querySnapshot.forEach((doc) => {
                    allLogs.push(doc.data());
                });
                renderLogs(allLogs);
            } catch (error) {
                logsContainer.innerHTML = `<div class="text-center py-12 text-red-400 col-span-full"><p>فشل تحميل البيانات: ${error.message}</p></div>`;
            }
        }

        // بناء بطاقات البيانات داخل الواجهة
        function renderLogs(logsArray) {
            if(logsArray.length === 0) {
                logsContainer.innerHTML = `<div class="text-center py-12 text-slate-500 col-span-full"><p>لا توجد أي بيانات مدخلة حتى الآن.</p></div>`;
                return;
            }
            
            logsContainer.innerHTML = "";
            logsArray.forEach(log => {
                const dateObj = new Date(log.timestamp);
                const formattedDate = dateObj.toLocaleDateString('ar-EG', {day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit'});
                
                let statusColor = "bg-emerald-500/10 text-emerald-400 border-emerald-500/20";
                if(log.status.includes("جاري")) statusColor = "bg-amber-500/10 text-amber-400 border-amber-500/20";
                if(log.status.includes("متأخر")) statusColor = "bg-red-500/10 text-red-400 border-red-500/20";

                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-3 shadow-md hover:border-slate-700 transition-all";
                card.innerHTML = `
                    <div class="flex justify-between items-start gap-2">
                        <div>
                            <h3 class="font-bold text-white text-base">${log.name}</h3>
                            <p class="text-xs text-slate-500 mt-0.5"><i class="fa-regular fa-envelope"></i> ${log.userEmail}</p>
                        </div>
                        <span class="text-xs px-2.5 py-1 rounded-full border ${statusColor} font-medium">${log.status}</span>
                    </div>
                    <p class="text-sm text-slate-300 bg-slate-950/40 p-3 rounded-lg border border-slate-850/50 whitespace-pre-line leading-relaxed">${log.details}</p>
                    <div class="text-left">
                        <span class="text-[10px] text-slate-500 font-mono"><i class="fa-regular fa-clock"></i> ${formattedDate}</span>
                    </div>
                `;
                logsContainer.appendChild(card);
            });
        }

        // تفعيل الفلترة والبحث اللحظي عند الكتابة من الموبايل
        searchFilter.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allLogs.filter(log => 
                log.name.toLowerCase().includes(term) || 
                log.status.toLowerCase().includes(term) ||
                log.details.toLowerCase().includes(term)
            );
            renderLogs(filtered);
        });
    </script>
</body>
</html>
