<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقرير اليومي للمدرب الميداني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', 'Plus Jakarta Sans', sans-serif; }
        /* تصميم شريط التمرير للنافذة المنبثقة */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between">

    <div id="report-modal" class="hidden fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 transition-opacity">
        <div class="bg-slate-900 rounded-2xl w-full max-w-2xl max-h-[90vh] flex flex-col border border-slate-700 shadow-2xl">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900 rounded-t-2xl sticky top-0">
                <h3 class="text-white font-bold text-lg"><i class="fa-solid fa-file-lines text-indigo-400 ml-2"></i>تفاصيل التقرير الميداني</h3>
                <button id="close-modal" class="text-slate-400 hover:text-red-400 transition-colors w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-800">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div id="modal-content" class="p-5 overflow-y-auto space-y-3 text-sm pb-10">
                </div>
        </div>
    </div>

    <div id="app-screen" class="flex-grow flex flex-col">
        <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 px-4 py-4 shadow-md">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <span class="text-indigo-400 text-lg font-bold">التقرير الميداني اليومي</span>
                <button id="btn-logout" class="hidden bg-slate-800 text-slate-300 px-3 py-1.5 rounded-lg text-sm border border-slate-700">خروج</button>
            </div>
        </header>

        <div class="bg-slate-900/50 border-b border-slate-800/60 p-2">
            <div class="max-w-6xl mx-auto flex gap-2">
                <button id="tab-form" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium">إدخال التقرير</button>
                <button id="tab-dashboard" class="flex-1 px-4 py-2 bg-slate-800 text-slate-300 rounded-lg text-sm font-medium">الأرشيف والمتابعة</button>
            </div>
        </div>

        <main class="max-w-6xl w-full mx-auto p-4 flex-grow">
            <section id="form-view" class="max-w-2xl mx-auto py-4">
                <form id="daily-data-form" class="space-y-6">
                    
                    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-4 shadow-lg">
                        <h3 class="text-lg font-bold text-indigo-400 border-b border-slate-800 pb-2">البيانات الأساسية</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div><label class="block text-xs text-slate-400 mb-1">اسم المدرب *</label><input type="text" id="f-name" required class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></div>
                            <div><label class="block text-xs text-slate-400 mb-1">الكود الوظيفي *</label><input type="text" id="f-code" required class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></div>
                            <div><label class="block text-xs text-slate-400 mb-1">التاريخ *</label><input type="date" id="f-date" required class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></div>
                            <div><label class="block text-xs text-slate-400 mb-1">المنطقة</label><input type="text" id="f-region" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></div>
                            <div class="sm:col-span-2"><label class="block text-xs text-slate-400 mb-1">المشرف المباشر</label><input type="text" id="f-supervisor" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></div>
                        </div>
                    </div>

                    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-4 shadow-lg">
                        <h3 class="text-lg font-bold text-indigo-400 border-b border-slate-800 pb-2">أوقات العمل</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <div><label class="block text-xs text-slate-400 mb-1">الحضور *</label><input type="time" id="f-time-in" required class="w-full px-2 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></div>
                            <div><label class="block text-xs text-slate-400 mb-1">الانصراف *</label><input type="time" id="f-time-out" required class="w-full px-2 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></div>
                            <div><label class="block text-xs text-slate-400 mb-1">إجمالي الساعات (تلقائي)</label><input type="text" id="f-hours" readonly class="w-full px-2 py-2 bg-slate-950/50 border border-slate-800 rounded-lg text-sm text-indigo-300 outline-none cursor-not-allowed text-center font-bold placeholder-slate-700" placeholder="سيتم الحساب..."></div>
                        </div>
                    </div>

                    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-4 shadow-lg">
                        <h3 class="text-lg font-bold text-indigo-400 border-b border-slate-800 pb-2">الأنشطة المنفذة</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm" id="activities-group">
                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="محاضرة نظرية" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> <span class="font-medium text-slate-300">محاضرة نظرية</span></label>
                                <textarea rows="2" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-sm text-white outline-none focus:border-indigo-500" placeholder="اكتب التفاصيل (اضغط Enter لسطر جديد)..."></textarea>
                            </div>
                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="تدريب عملي" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> <span class="font-medium text-slate-300">تدريب عملي</span></label>
                                <textarea rows="2" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-sm text-white outline-none focus:border-indigo-500" placeholder="اكتب التفاصيل..."></textarea>
                            </div>
                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="تدريب على رأس العمل" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> <span class="font-medium text-slate-300">تدريب على رأس العمل</span></label>
                                <textarea rows="2" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-sm text-white outline-none focus:border-indigo-500" placeholder="اكتب التفاصيل..."></textarea>
                            </div>
                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="استصحاب قطارات" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> <span class="font-medium text-slate-300">استصحاب قطارات</span></label>
                                <textarea rows="2" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-sm text-white outline-none focus:border-indigo-500" placeholder="رقم القطار / الرحلة..."></textarea>
                            </div>
                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="تفتيش ميداني" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> <span class="font-medium text-slate-300">تفتيش ميداني</span></label>
                                <textarea rows="2" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-sm text-white outline-none focus:border-indigo-500" placeholder="مكان وتفاصيل التفتيش..."></textarea>
                            </div>
                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="زيارة ورش/أحواش" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> <span class="font-medium text-slate-300">زيارة ورش / أحواش</span></label>
                                <textarea rows="2" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-sm text-white outline-none focus:border-indigo-500" placeholder="اسم الورشة / الحوش..."></textarea>
                            </div>
                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="جلسة أونلاين" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> <span class="font-medium text-slate-300">جلسة أونلاين</span></label>
                                <textarea rows="2" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-sm text-white outline-none focus:border-indigo-500" placeholder="موضوع الجلسة والمنصة..."></textarea>
                            </div>
                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="حضور تحقيق" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> <span class="font-medium text-slate-300">حضور تحقيق</span></label>
                                <textarea rows="2" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-sm text-white outline-none focus:border-indigo-500" placeholder="تفاصيل التحقيق..."></textarea>
                            </div>
                            <div class="flex flex-col gap-2 bg-slate-950/50 p-2 rounded-lg border border-transparent hover:border-slate-800 transition-all sm:col-span-2">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" value="أخري" class="activity-checkbox rounded bg-slate-900 border-slate-700 w-4 h-4"> <span class="font-medium text-slate-300">أخري</span></label>
                                <textarea rows="2" class="activity-input hidden w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-sm text-white outline-none focus:border-indigo-500" placeholder="اكتب تفاصيل الأنشطة الأخرى..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-4 shadow-lg">
                        <h3 class="text-lg font-bold text-indigo-400 border-b border-slate-800 pb-2">تفاصيل العمل والمستهدفين</h3>
                        <div><label class="block text-xs text-slate-400 mb-1">أماكن العمل أو الزيارات</label><textarea id="f-locations" rows="2" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></textarea></div>
                        <div><label class="block text-xs text-slate-400 mb-1">الموضوعات التدريبية</label><textarea id="f-topics" rows="2" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></textarea></div>
                        <div><label class="block text-xs text-slate-400 mb-1">الفئات المستهدفة</label><textarea id="f-targets" rows="2" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></textarea></div>
                        <div><label class="block text-xs text-slate-400 mb-1">عدد المتدربين وأسمائهم</label><textarea id="f-trainees" rows="2" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></textarea></div>
                    </div>

                    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-4 shadow-lg">
                        <h3 class="text-lg font-bold text-indigo-400 border-b border-slate-800 pb-2">الملاحظات والنتائج</h3>
                        <div><label class="block text-xs text-slate-400 mb-1">التعليمات أو المنشورات التي تم توصيلها</label><textarea id="f-instructions" rows="2" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></textarea></div>
                        <div><label class="block text-xs text-slate-400 mb-1">الملاحظات والمعوقات</label><textarea id="f-notes" rows="2" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></textarea></div>
                        <div><label class="block text-xs text-slate-400 mb-1">الإجراءات المتخذة</label><textarea id="f-actions" rows="2" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></textarea></div>
                        <div><label class="block text-xs text-slate-400 mb-1">التوصيات</label><textarea id="f-recommendations" rows="2" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></textarea></div>
                        <div><label class="block text-xs text-slate-400 mb-1">ملخص إنجازات اليوم</label><textarea id="f-summary" rows="3" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-lg text-sm text-white outline-none focus:border-indigo-500"></textarea></div>
                    </div>

                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-600/20 transition-all text-lg">إرسال التقرير النهائي</button>
                </form>
            </section>

            <section id="dashboard-view" class="hidden space-y-4 py-4">
                <input type="text" id="search-filter" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 text-white outline-none shadow-lg" placeholder="ابحث باسم المدرب أو المنطقة أو التاريخ...">
                
                <div id="logs-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                    </div>
            </section>

        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ ضع مفاتيح Firebase الخاصة بك هنا
        const firebaseConfig = {
            apiKey: "AIzaSyDqOMOxCyTBRouVjAN-70FNaJjTElqeJdE",
    authDomain: "gharably-aad60.firebaseapp.com",
    projectId: "gharably-aad60",
    storageBucket: "gharably-aad60.firebasestorage.app",
    messagingSenderId: "715813598117",
    appId: "1:715813598117:web:d7a3eea856f20ec4a2ee4c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allLogs = [];

        // حساب الوقت التلقائي
        function calculateHours() {
            const timeIn = document.getElementById('f-time-in').value;
            const timeOut = document.getElementById('f-time-out').value;
            const hoursInput = document.getElementById('f-hours');

            if (timeIn && timeOut) {
                const [inH, inM] = timeIn.split(':').map(Number);
                const [outH, outM] = timeOut.split(':').map(Number);

                let diffM = outM - inM;
                let diffH = outH - inH;

                if (diffM < 0) { diffM += 60; diffH -= 1; }
                if (diffH < 0) { diffH += 24; } // معالجة الورديات التي تتخطى منتصف الليل

                hoursInput.value = `${diffH} ساعات و ${diffM} دقيقة`;
            } else {
                hoursInput.value = '';
            }
        }

        document.getElementById('f-time-in').addEventListener('input', calculateHours);
        document.getElementById('f-time-out').addEventListener('input', calculateHours);

        // إظهار وإخفاء مربع النص عند اختيار النشاط
        document.querySelectorAll('.activity-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', (e) => {
                const parentDiv = e.target.closest('div');
                const inputField = parentDiv.querySelector('.activity-input');
                if (e.target.checked) {
                    inputField.classList.remove('hidden');
                    inputField.focus();
                } else {
                    inputField.classList.add('hidden');
                    inputField.value = '';
                }
            });
        });

        // التنقل بين الشاشات
        function showView(view) {
            document.getElementById('form-view').classList.toggle('hidden', view !== 'form');
            document.getElementById('dashboard-view').classList.toggle('hidden', view !== 'dashboard');
            document.getElementById('tab-form').className = view === 'form' ? "flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium" : "flex-1 px-4 py-2 bg-slate-800 text-slate-300 rounded-lg text-sm font-medium";
            document.getElementById('tab-dashboard').className = view === 'dashboard' ? "flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium" : "flex-1 px-4 py-2 bg-slate-800 text-slate-300 rounded-lg text-sm font-medium";
            if(view === 'dashboard') loadLogsData();
        }

        document.getElementById('tab-form').addEventListener('click', () => showView('form'));
        document.getElementById('tab-dashboard').addEventListener('click', () => showView('dashboard'));
        
        // تشغيل واجهة الإدخال مباشرة 
        showView('form');

        // إرسال البيانات
        document.getElementById('daily-data-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const selectedActivities = [];
            document.querySelectorAll('.activity-checkbox:checked').forEach(cb => {
                const parentDiv = cb.closest('div');
                const textInput = parentDiv.querySelector('.activity-input');
                let activityText = cb.value;
                if (textInput && textInput.value.trim() !== '') {
                    activityText += `\n(${textInput.value.trim()})`; 
                }
                selectedActivities.push(activityText);
            });

            const reportData = {
                trainerName: document.getElementById('f-name').value,
                jobCode: document.getElementById('f-code').value,
                reportDate: document.getElementById('f-date').value,
                region: document.getElementById('f-region').value,
                supervisor: document.getElementById('f-supervisor').value,
                timeIn: document.getElementById('f-time-in').value,
                timeOut: document.getElementById('f-time-out').value,
                totalHours: document.getElementById('f-hours').value,
                activities: selectedActivities,
                locations: document.getElementById('f-locations').value,
                topics: document.getElementById('f-topics').value,
                targets: document.getElementById('f-targets').value,
                trainees: document.getElementById('f-trainees').value,
                instructions: document.getElementById('f-instructions').value,
                notes: document.getElementById('f-notes').value,
                actions: document.getElementById('f-actions').value,
                recommendations: document.getElementById('f-recommendations').value,
                summary: document.getElementById('f-summary').value,
                submitterEmail: auth.currentUser ? auth.currentUser.email : "مستخدم مؤقت",
                timestamp: new Date().toISOString()
            };
            
            try {
                const btn = e.target.querySelector('button[type="submit"]');
                btn.innerText = "جاري الإرسال..."; btn.disabled = true;
                await addDoc(collection(db, "daily_reports"), reportData);
                alert("تم رفع التقرير بنجاح!");
                e.target.reset();
                document.getElementById('f-hours').value = '';
                document.querySelectorAll('.activity-input').forEach(input => input.classList.add('hidden'));
                btn.innerText = "إرسال التقرير النهائي"; btn.disabled = false;
            } catch (error) {
                alert("خطأ: " + error.message);
                e.target.querySelector('button[type="submit"]').innerText = "إرسال التقرير النهائي";
                e.target.querySelector('button[type="submit"]').disabled = false;
            }
        });

        // جلب البيانات للأرشيف
        async function loadLogsData() {
            const container = document.getElementById('logs-container');
            container.innerHTML = `<p class="text-center text-slate-500 py-10 col-span-full">جاري التحميل...</p>`;
            try {
                const q = query(collection(db, "daily_reports"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                allLogs = [];
                querySnapshot.forEach((doc) => allLogs.push(doc.data()));
                renderLogs(allLogs);
            } catch (error) {
                container.innerHTML = `<p class="text-center text-red-500 col-span-full">فشل التحميل: ${error.message}</p>`;
            }
        }

        // بناء كروت الأرشيف المصغرة
        function renderLogs(logs) {
            const container = document.getElementById('logs-container');
            if(logs.length === 0) { container.innerHTML = `<p class="text-center text-slate-500 py-10 col-span-full">لا توجد تقارير حتى الآن.</p>`; return; }
            
            container.innerHTML = "";
            logs.forEach((log, index) => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 hover:border-indigo-500/50 rounded-xl p-4 cursor-pointer transition-all shadow-lg hover:shadow-indigo-500/10 group";
                
                // حفظ البيانات في الكارت لاستخدامها عند الضغط
                card.onclick = () => openModal(log);

                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-indigo-500/10 text-indigo-400 flex items-center justify-center font-bold text-lg group-hover:bg-indigo-500 group-hover:text-white transition-colors">
                            <i class="fa-regular fa-user"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-white text-sm truncate max-w-[200px]">${log.trainerName}</h3>
                            <p class="text-xs text-slate-400 mt-0.5"><i class="fa-regular fa-calendar ml-1"></i>${log.reportDate || '-'}</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // بناء النافذة المنبثقة للتقرير (تعرض الخانات الممتلئة فقط)
        function openModal(log) {
            const modal = document.getElementById('report-modal');
            const content = document.getElementById('modal-content');
            
            let html = `
                <div class="flex justify-between items-start border-b border-slate-800 pb-4 mb-4">
                    <div>
                        <h2 class="font-bold text-white text-xl">${log.trainerName}</h2>
                        <p class="text-xs text-slate-400 mt-1">الكود الوظيفي: ${log.jobCode}</p>
                    </div>
                    <span class="text-xs bg-indigo-500/20 text-indigo-300 px-3 py-1.5 rounded-full border border-indigo-500/30">${log.reportDate}</span>
                </div>
            `;

            // دالة مساعدة لإنشاء قسم فقط إذا كان يحتوي على نص
            const addSection = (title, value) => {
                if (value && value.trim() !== '') {
                    html += `
                        <div class="bg-slate-950/50 p-3 rounded-lg border border-slate-800">
                            <strong class="text-indigo-400 block mb-1 text-xs">${title}</strong>
                            <p class="text-slate-300 whitespace-pre-line leading-relaxed">${value}</p>
                        </div>
                    `;
                }
            };

            addSection("المنطقة", log.region);
            addSection("المشرف المباشر", log.supervisor);
            
            if(log.timeIn && log.timeOut) {
                addSection("أوقات العمل", `من ${log.timeIn} إلى ${log.timeOut} \n(الإجمالي: ${log.totalHours || 'غير محسوب'})`);
            }

            if(log.activities && log.activities.length > 0) {
                const acts = log.activities.map(a => `<div class="bg-slate-800 text-slate-200 px-3 py-2 rounded-md border border-slate-700 whitespace-pre-line leading-snug">${a}</div>`).join('');
                html += `<div class="bg-slate-950/50 p-3 rounded-lg border border-slate-800 space-y-2"><strong class="text-indigo-400 block mb-2 text-xs">الأنشطة المنفذة</strong><div class="grid gap-2">${acts}</div></div>`;
            }

            addSection("أماكن العمل أو الزيارات", log.locations);
            addSection("الموضوعات التدريبية", log.topics);
            addSection("الفئات المستهدفة", log.targets);
            addSection("عدد المتدربين وأسمائهم", log.trainees);
            addSection("التعليمات أو المنشورات", log.instructions);
            addSection("الملاحظات والمعوقات", log.notes);
            addSection("الإجراءات المتخذة", log.actions);
            addSection("التوصيات", log.recommendations);
            addSection("ملخص إنجازات اليوم", log.summary);

            content.innerHTML = html;
            modal.classList.remove('hidden');
        }

        // إغلاق النافذة المنبثقة
        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('report-modal').classList.add('hidden');
        });

        // إغلاق النافذة عند الضغط خارجها
        document.getElementById('report-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('report-modal')) {
                document.getElementById('report-modal').classList.add('hidden');
            }
        });

        // فلترة البحث
        document.getElementById('search-filter').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allLogs.filter(log => 
                (log.trainerName && log.trainerName.toLowerCase().includes(term)) || 
                (log.region && log.region.toLowerCase().includes(term)) ||
                (log.reportDate && log.reportDate.includes(term))
            );
            renderLogs(filtered);
        });
    </script>
</body>
</html>
